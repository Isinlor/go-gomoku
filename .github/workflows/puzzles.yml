name: Puzzles

on:
  push:
  pull_request:

jobs:
  puzzles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
      - name: Install dependencies
        run: make install
      - name: Run puzzle tests
        run: npm run test:puzzles
