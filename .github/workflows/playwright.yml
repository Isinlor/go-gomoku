name: Playwright Tests

on:
  push:
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install firefox --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload screenshot to summary
        if: always()
        run: |
          if [ -f e2e/screenshots/game-board.png ]; then
            echo "## GoGomoku Playwright Screenshot" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"

            # Encode screenshot as base64 data URI for inline display
            BASE64=$(base64 -w 0 e2e/screenshots/game-board.png)
            echo "<img src=\"data:image/png;base64,${BASE64}\" alt=\"Game Board Screenshot\" width=\"800\" />" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            e2e/screenshots/
            test-results/
          retention-days: 7
