<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GoGomoku Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, sans-serif;
      }
      body {
        margin: 0;
        padding: 24px;
        display: grid;
        gap: 16px;
        background: #f4efe2;
        color: #1e1b16;
      }
      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      button, select, input {
        font: inherit;
      }
      #board {
        display: grid;
        gap: 1px;
        background: #7b5b2b;
        padding: 1px;
        width: fit-content;
        user-select: none;
      }
      .cell {
        width: 36px;
        height: 36px;
        border: 0;
        background: #d9b86b;
        display: grid;
        place-items: center;
        cursor: pointer;
        font-size: 24px;
        line-height: 1;
      }
      .cell:disabled {
        cursor: default;
      }
      .stone-black {
        color: #111;
      }
      .stone-white {
        color: #fff;
        text-shadow: 0 0 1px #000;
      }
      #status {
        font-weight: 600;
      }
      .hint {
        max-width: 72ch;
        line-height: 1.45;
      }
      .game-record-section {
        display: grid;
        gap: 6px;
        max-width: 52ch;
      }
      .game-record-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #game-record {
        flex: 1;
        font-family: monospace;
        font-size: 13px;
        resize: vertical;
        min-height: 48px;
      }
      .load-section {
        display: grid;
        gap: 6px;
        max-width: 52ch;
      }
      #load-input {
        width: 100%;
        font-family: monospace;
        font-size: 13px;
        resize: vertical;
        min-height: 48px;
        box-sizing: border-box;
      }
      .load-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #load-error {
        color: #c0392b;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <label>
        Board size
        <select id="board-size">
          <option value="9">9x9</option>
          <option value="11">11x11</option>
          <option value="13">13x13</option>
        </select>
      </label>
      <label>
        AI time limit (ms)
        <input id="time-limit" type="number" min="1" step="1" value="75" />
      </label>
      <button id="new-game">New game</button>
      <button id="undo">Undo pair</button>
    </div>

    <div id="status"></div>
    <div id="board" aria-label="GoGomoku board"></div>

    <div class="game-record-section">
      <label><strong>Game record</strong></label>
      <div class="game-record-row">
        <textarea id="game-record" readonly rows="2" aria-label="Game record in move notation"></textarea>
        <button id="copy-url" type="button">Copy URL</button>
      </div>
    </div>

    <div class="load-section">
      <label for="load-input"><strong>Load game</strong></label>
      <textarea id="load-input" rows="2" placeholder="e.g. B9 e5 d4 f4 ..."></textarea>
      <div class="load-row">
        <button id="load-game-btn" type="button">Load game</button>
        <span id="load-error"></span>
      </div>
    </div>

    <div class="hint">
      You play <strong>black</strong>. The demo uses the same engine and AI exported by the package. Serve this folder with any static HTTP server and open this file in a browser.
    </div>

    <script type="module">
      import { BLACK, GogoAI, GogoPosition, WHITE, playerName, decodeGame } from './build/src/index.js';

      const boardElement = document.querySelector('#board');
      const statusElement = document.querySelector('#status');
      const sizeSelect = document.querySelector('#board-size');
      const timeLimitInput = document.querySelector('#time-limit');
      const newGameButton = document.querySelector('#new-game');
      const undoButton = document.querySelector('#undo');
      const gameRecordTextarea = document.querySelector('#game-record');
      const copyUrlButton = document.querySelector('#copy-url');
      const loadInput = document.querySelector('#load-input');
      const loadGameButton = document.querySelector('#load-game-btn');
      const loadError = document.querySelector('#load-error');

      let game = new GogoPosition(9);
      let ai = makeAI(9);
      let aiThinking = false;

      function makeAI(size) {
        return new GogoAI({ maxDepth: size === 13 ? 5 : 6, quiescenceDepth: 6, maxPly: 96 });
      }

      function gameUrl(record) {
        return location.href.split('#')[0] + '#' + encodeURIComponent(record);
      }

      function describeStatus(extra = '') {
        if (game.winner !== 0) {
          statusElement.textContent = `${playerName(game.winner)} wins${extra ? ` — ${extra}` : ''}`;
          return;
        }
        if (!game.hasAnyLegalMove()) {
          statusElement.textContent = `draw${extra ? ` — ${extra}` : ''}`;
          return;
        }
        statusElement.textContent = `${playerName(game.toMove)} to move${extra ? ` — ${extra}` : ''}`;
      }

      function updateGameRecord() {
        const record = game.encodeGame();
        gameRecordTextarea.value = record;
        window.history.replaceState(null, '', gameUrl(record));
      }

      function renderBoard() {
        boardElement.style.gridTemplateColumns = `repeat(${game.size}, 36px)`;
        boardElement.textContent = '';
        for (let y = 0; y < game.size; y += 1) {
          for (let x = 0; x < game.size; x += 1) {
            const index = game.index(x, y);
            const value = game.board[index];
            const button = document.createElement('button');
            button.className = 'cell';
            button.type = 'button';
            button.disabled = aiThinking || value !== 0 || game.winner !== 0;
            button.dataset.index = String(index);
            button.textContent = value === BLACK ? '●' : value === WHITE ? '●' : '';
            if (value === BLACK) {
              button.classList.add('stone-black');
            } else if (value === WHITE) {
              button.classList.add('stone-white');
            }
            button.addEventListener('click', () => onHumanMove(index));
            boardElement.appendChild(button);
          }
        }
        updateGameRecord();
      }

      function newGame() {
        const size = Number(sizeSelect.value);
        game = new GogoPosition(size);
        ai = makeAI(size);
        aiThinking = false;
        renderBoard();
        describeStatus();
      }

      function maybeRunAI() {
        if (game.winner !== 0 || game.toMove !== WHITE || aiThinking) {
          renderBoard();
          describeStatus();
          return;
        }
        aiThinking = true;
        renderBoard();
        describeStatus('AI searching');
        queueMicrotask(() => {
          const timeLimitMs = Math.max(1, Number(timeLimitInput.value) || 75);
          const result = ai.findBestMove(game, timeLimitMs);
          if (result.move !== -1) {
            game.play(result.move);
          }
          aiThinking = false;
          renderBoard();
          describeStatus(`AI depth ${result.depth}, nodes ${result.nodes}`);
        });
      }

      function onHumanMove(index) {
        if (aiThinking || game.toMove !== BLACK || game.winner !== 0) {
          return;
        }
        if (!game.play(index)) {
          describeStatus('illegal move');
          renderBoard();
          return;
        }
        renderBoard();
        describeStatus();
        maybeRunAI();
      }

      newGameButton.addEventListener('click', newGame);
      undoButton.addEventListener('click', () => {
        if (aiThinking) {
          return;
        }
        game.undo();
        game.undo();
        renderBoard();
        describeStatus();
      });

      copyUrlButton.addEventListener('click', () => {
        const url = gameUrl(game.encodeGame());
        navigator.clipboard.writeText(url).catch(() => {
          prompt('Copy this URL:', url);
        });
      });

      loadGameButton.addEventListener('click', () => {
        loadError.textContent = '';
        const text = loadInput.value.trim();
        if (!text) {
          return;
        }
        try {
          const loaded = decodeGame(text);
          game = loaded;
          ai = makeAI(loaded.size);
          sizeSelect.value = String(loaded.size);
          aiThinking = false;
          renderBoard();
          describeStatus();
          maybeRunAI();
        } catch (err) {
          loadError.textContent = err.message;
        }
      });

      function tryLoadFromUrl() {
        const hash = location.hash.slice(1);
        if (!hash) {
          return false;
        }
        try {
          const text = decodeURIComponent(hash);
          const loaded = decodeGame(text);
          game = loaded;
          ai = makeAI(loaded.size);
          sizeSelect.value = String(loaded.size);
          aiThinking = false;
          renderBoard();
          describeStatus();
          maybeRunAI();
          return true;
        } catch (_) {
          return false;
        }
      }

      if (!tryLoadFromUrl()) {
        newGame();
      }
    </script>
  </body>
</html>
