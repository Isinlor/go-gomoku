<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GoGomoku Demo</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, system-ui, sans-serif;
      }
      body {
        margin: 0;
        padding: 24px;
        display: grid;
        gap: 16px;
        background: #f4efe2;
        color: #1e1b16;
      }
      .toolbar {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
      }
      button, select, input {
        font: inherit;
      }
      .board {
        display: grid;
        gap: 1px;
        background: #7b5b2b;
        padding: 1px;
        width: fit-content;
        user-select: none;
      }
      .cell {
        width: 36px;
        height: 36px;
        border: 0;
        background: #d9b86b;
        display: grid;
        place-items: center;
        cursor: pointer;
        font-size: 24px;
        line-height: 1;
      }
      .cell.eval-cell {
        background: hsl(calc(8 + (120 * var(--eval-probability, 0))), 85%, calc(62% - (10% * var(--eval-probability, 0))));
      }
      .cell:disabled {
        cursor: default;
      }
      .stone-black {
        color: #111;
      }
      .stone-white {
        color: #fff;
        text-shadow: 0 0 1px #000;
      }
      #status {
        font-weight: 600;
      }
      .hint {
        max-width: 72ch;
        line-height: 1.45;
      }
      .game-record-section {
        display: grid;
        gap: 6px;
        max-width: 52ch;
      }
      .game-record-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #game-record {
        flex: 1;
        font-family: monospace;
        font-size: 13px;
        resize: vertical;
        min-height: 48px;
      }
      .load-section {
        display: grid;
        gap: 6px;
        max-width: 52ch;
      }
      #load-input {
        width: 100%;
        font-family: monospace;
        font-size: 13px;
        resize: vertical;
        min-height: 48px;
        box-sizing: border-box;
      }
      .load-row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #load-error {
        color: #c0392b;
        font-size: 13px;
      }
      .player-fieldset {
        border: 1px solid #9b7a3e;
        border-radius: 6px;
        padding: 2px 10px 6px;
        margin: 0;
        font-size: 14px;
      }
      .player-fieldset legend {
        padding: 0 4px;
        font-size: 13px;
        font-weight: 600;
      }
      .player-fieldset label {
        margin-right: 8px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
